name: Automated Builds

on:
  push:
    branches: [ "9-automate-release-files-on-prs" ] 
  workflow_dispatch: 

jobs:
  build:
    # Run on windows, ubuntu, and mac
    strategy:
      matrix:
        include:
          - os: windows-latest
            nuitka_mode: standalone
          - os: ubuntu-latest
            nuitka_mode: standalone
          - os: macos-latest
            nuitka_mode: app
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 
          cache: 'pip'

      # Linux requires underlying display libraries to compile PyQt5 apps
      - name: Install System Dependencies (Linux Only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-shape0 libxcb-randr0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0
          
      - name: Install Python Dependencies
        run: pip install pyqt5 numpy anomalib lightning 

      # Nuitka Caching Step for ccache
      - name: Cache Nuitka C Compiler Data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/Library/Caches/Nuitka
            ~\AppData\Local\Nuitka\Nuitka\Cache
          key: ${{ runner.os }}-nuitka-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: src/main.py
          mode: ${{ matrix.nuitka_mode }}          
          enable-plugins: |
            pyqt5
          include-data-dir: logos=logos 
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Executable-${{ matrix.os }}
          path: build
          include-hidden-files: true