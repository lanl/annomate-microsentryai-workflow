name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - staging

jobs:
  # -------------------------------------------------------------------------
  # LINTING JOB
  # Uses lightweight pip to save compute time (pre-commit creates its own envs)
  # -------------------------------------------------------------------------
  lint:
    name: Lint & Format (Ruff via pre-commit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  # -------------------------------------------------------------------------
  # TESTING JOB
  # Uses environment-cpu.yml via Conda (Python 3.10)
  # -------------------------------------------------------------------------
  test:
    name: Test on ${{ matrix.os }} with Python 3.10
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    # This ensures that Conda is properly activated in every step that runs a bash script
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda & Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: annomate-cpu
          environment-file: environment-cpu.yml
          auto-activate-base: false
          # Caching Conda packages speeds up subsequent workflow runs
          use-only-tar-bz2: true 

      - name: Install Testing Dependencies
        # pytest and pytest-qt aren't in your environment-cpu.yml, so we add them here
        run: pip install pytest pytest-qt


      - name: Install Headless Display Dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xinput0 \
            libxcb-cursor0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libegl1 \
            libdbus-1-3 \
            libopengl0

      - name: Run pytest (Linux)
        if: runner.os == 'Linux'
        working-directory: ./src
        # xvfb-run spins up the virtual display for the duration of the tests
        run: xvfb-run -a pytest

      - name: Run pytest (macOS / Windows)
        if: runner.os != 'Linux'
        working-directory: ./src
        run: pytest