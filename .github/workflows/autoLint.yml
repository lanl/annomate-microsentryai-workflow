name: Auto-fix lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  autofix:
    name: Ruff auto-fix and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff

      # PR: auto-fix violations and commit back to the PR branch
      - name: Auto-fix and format (PR only)
        if: github.event_name == 'pull_request'
        run: |
          ruff check --fix .
          ruff format .
      - name: Commit and push if anything changed (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -u && git commit -m "style: auto-fix ruff lint and format" && git push)

      # Push to main: check-only — fail if violations exist, never commit
      - name: Lint check only (push to main)
        if: github.event_name == 'push'
        run: |
          ruff check .
          ruff format --check .
